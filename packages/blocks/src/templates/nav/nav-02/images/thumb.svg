  <text x="213" y="72" font-family="sans-serif" font-size="11" font-weight="600" fill="white">+7 999 801</text>
  <text x="213" y="87" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">info@randee.ru</text>
  <!-- CTA button -->
  <rect x="213" y="100" width="54" height="18" rx="9" fill="#6653B7"/>
