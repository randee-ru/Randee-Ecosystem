  <text x="20" y="108" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">Готовые решения</text>
  <text x="20" y="122" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">Про нас</text>
  <text x="20" y="136" font-family="sans-serif" font-size="9" fill="rgba(255,255,255,0.85)">Контакты</text>
  <!-- Divider -->
  <line x1="115" y1="44" x2="115" y2="148" stroke="rgba(62,207,190,0.55)" stroke-width="1"/>
