<svg xmlns="http://www.w3.org/2000/svg" width="280" height="160" viewBox="0 0 280 160" fill="none">
  <rect width="280" height="160" fill="#0d1010"/>
  <!-- Backdrop blur -->
  <rect width="280" height="160" fill="rgba(10,12,12,0.55)"/>
  <!-- Close button -->
  <rect x="240" y="14" width="26" height="26" rx="6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="247" y1="21" x2="259" y2="33" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="259" y1="21" x2="247" y2="33" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Col 1: МЕ НЮ brand -->
  <text x="20" y="58" font-family="sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">МЕ</text>
  <text x="20" y="84" font-family="sans-serif" font-size="28" font-weight="700" fill="white" letter-spacing="-0.5">НЮ</text>
