  <text x="128" y="58" font-family="sans-serif" font-size="10" font-weight="600" fill="white">Разработка сайтов</text>
  <text x="128" y="76" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.75)">Лендинг</text>
  <text x="128" y="89" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.75)">Интернет-магазин</text>
  <text x="128" y="102" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.75)">Промо-сайт</text>
